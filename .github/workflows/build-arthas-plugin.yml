name: Build and Release Arthas Plugin

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a GitHub Release and upload build artifacts'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag to use when manually publishing, e.g. v0.0.1'
        required: false
        type: string
      release_name:
        description: 'Optional release title'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
      should_release: ${{ steps.release_meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up latest JDK (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Project with Maven
        run: mvn -B -ntp -pl arthas-plugin clean verify

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          should_release="false"
          release_tag=""
          release_name=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            should_release="true"
            release_tag="${GITHUB_REF_NAME}"
            release_name="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_release }}" == "true" ]]; then
            should_release="true"
            release_tag="${{ inputs.release_tag }}"
            release_name="${{ inputs.release_name }}"
          fi

          if [[ "$should_release" == "true" && -z "$release_tag" ]]; then
            echo "Manual release requires 'release_tag' input." >&2
            exit 1
          fi

          if [[ "$should_release" == "true" && -z "$release_name" ]]; then
            release_name="$release_tag"
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum files
        shell: bash
        run: |
          cd arthas-plugin/target
          shopt -s nullglob
          for file in original-arthas-plugin-*.jar; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arthas-plugin-release-assets
          path: |
            arthas-plugin/target/original-arthas-plugin-*.jar
            arthas-plugin/target/original-arthas-plugin-*.jar.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    if: ${{ needs.build.outputs.should_release == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: arthas-plugin-release-assets
          path: release-assets

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: ${{ needs.build.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/original-arthas-plugin-*.jar
            release-assets/original-arthas-plugin-*.jar.sha256
